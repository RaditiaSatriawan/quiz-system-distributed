version: '3.8'

services:
  # PostgreSQL Primary
  postgres-primary:
    image: postgres:15
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_primary_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d quizdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quiz-network

  # PostgreSQL Replica
  postgres-replica:
    image: postgres:15
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - quiz-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - quiz-network

  # Quiz Service
  quiz-service:
    build: ./quiz-service
    ports:
      - "6000:6000"
    environment:
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: quizdb
      DB_USER: admin
      DB_PASSWORD: secret123
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  # Submission Service
  submission-service:
    build: ./submission-service
    ports:
      - "7000:7000"
    environment:
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: quizdb
      DB_USER: admin
      DB_PASSWORD: secret123
      RABBITMQ_HOST: rabbitmq
      QUIZ_SERVICE_URL: http://quiz-service:6000
    depends_on:
      postgres-primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build: ./notification-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: quizdb
      DB_USER: admin
      DB_PASSWORD: secret123
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres-primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quiz-network
    restart: unless-stopped

  # API Gateway 1
  api-gateway-1:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      NODE_ID: 1
      NODE_PORT: 5000
      QUIZ_SERVICE_URL: http://quiz-service:6000
      SUBMISSION_SERVICE_URL: http://submission-service:7000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      NODES_CONFIG: '[{"id":1,"host":"api-gateway-1","port":5000},{"id":2,"host":"api-gateway-2","port":5001},{"id":3,"host":"api-gateway-3","port":5002}]'
    depends_on:
      - quiz-service
      - submission-service
      - notification-service
    networks:
      - quiz-network
    restart: unless-stopped

  # API Gateway 2
  api-gateway-2:
    build: ./api-gateway
    ports:
      - "5001:5001"
    environment:
      NODE_ID: 2
      NODE_PORT: 5001
      QUIZ_SERVICE_URL: http://quiz-service:6000
      SUBMISSION_SERVICE_URL: http://submission-service:7000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      NODES_CONFIG: '[{"id":1,"host":"api-gateway-1","port":5000},{"id":2,"host":"api-gateway-2","port":5001},{"id":3,"host":"api-gateway-3","port":5002}]'
    depends_on:
      - quiz-service
      - submission-service
      - notification-service
    networks:
      - quiz-network
    restart: unless-stopped

  # API Gateway 3
  api-gateway-3:
    build: ./api-gateway
    ports:
      - "5002:5002"
    environment:
      NODE_ID: 3
      NODE_PORT: 5002
      QUIZ_SERVICE_URL: http://quiz-service:6000
      SUBMISSION_SERVICE_URL: http://submission-service:7000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      NODES_CONFIG: '[{"id":1,"host":"api-gateway-1","port":5000},{"id":2,"host":"api-gateway-2","port":5001},{"id":3,"host":"api-gateway-3","port":5002}]'
    depends_on:
      - quiz-service
      - submission-service
      - notification-service
    networks:
      - quiz-network
    restart: unless-stopped

  # Nginx Load Balancer + GUI
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./gui:/usr/share/nginx/html
    depends_on:
      - api-gateway-1
      - api-gateway-2
      - api-gateway-3
    networks:
      - quiz-network
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_replica_data:

networks:
  quiz-network:
    driver: bridge
