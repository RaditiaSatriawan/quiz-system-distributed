<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizNet Student — Distributed Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p class="spinner-text">Loading...</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- App Shell -->
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="logo-text">
                        <h1>QuizNet</h1>
                        <span class="logo-subtitle">Student Portal</span>
                    </div>
                </div>
                <button class="sidebar-close" id="sidebarClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#" class="nav-link active" data-tab="take-quiz" onclick="switchTab('take-quiz')">
                            <i class="fas fa-pen-to-square"></i>
                            <span>Take Quiz</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-tab="results" onclick="switchTab('results')">
                            <i class="fas fa-chart-bar"></i>
                            <span>My Results</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-tab="notifications" onclick="switchTab('notifications')">
                            <i class="fas fa-bell"></i>
                            <span>Notifications</span>
                            <span class="nav-badge" id="notifBadge" style="display:none;">0</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="live-indicator" style="margin-bottom: 15px;">
                    <span class="pulse-dot"></span>
                    <span>System Online</span>
                </div>
                <a href="index.html" class="btn btn-ghost btn-block" style="color:var(--text-muted)">
                    <i class="fas fa-sign-out-alt"></i> Back to Login
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-title" id="topbarTitle">Take Quiz</div>
                <div class="topbar-actions">
                    <div class="student-input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="globalStudentId" placeholder="NIM/Username" value="student1">
                    </div>
                    <button class="topbar-btn" onclick="switchTab('notifications')" title="View Notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </header>

            <!-- Page Container -->
            <div class="page-container">

                <!-- ==================== TAKE QUIZ ==================== -->
                <section class="page active" id="page-take-quiz">
                    <!-- Quiz Selection -->
                    <div id="quizSelection">
                        <div class="card">
                            <div class="card-header">
                                <h2><i class="fas fa-pen-to-square"></i> Available Quizzes</h2>
                                <button class="btn btn-ghost btn-sm" onclick="loadAvailableQuizzes()">
                                    <i class="fas fa-sync-alt"></i> Refresh
                                </button>
                            </div>
                            <div class="card-body" id="availableQuizzes">
                                <div class="empty-state">
                                    <i class="fas fa-clipboard-list"></i>
                                    <p>No quizzes available</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Quiz Taking Area -->
                    <div id="quizTakingArea" style="display:none;">
                        <div class="quiz-header-bar">
                            <button class="btn btn-ghost" onclick="cancelQuiz()">
                                <i class="fas fa-arrow-left"></i> Abort
                            </button>
                            <div class="quiz-title-bar">
                                <h2 id="quizTakingTitle">Quiz Title</h2>
                                <span class="badge badge-info" id="quizQuestionCount">0 Questions</span>
                            </div>
                        </div>
                        <div id="quizQuestionsContainer"></div>
                        <div class="quiz-submit-bar">
                            <button class="btn btn-primary btn-lg" onclick="submitQuiz()">
                                <i class="fas fa-paper-plane"></i> Submit Answers
                            </button>
                        </div>
                    </div>
                </section>

                <!-- ==================== RESULTS ==================== -->
                <section class="page" id="page-results">
                    <div class="page-actions">
                        <button class="btn btn-ghost" onclick="loadMySubmissions()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-chart-bar"></i> My Submissions</h2>
                        </div>
                        <div class="card-body table-wrapper" id="resultsList">
                            <div class="empty-state">
                                <i class="fas fa-chart-pie"></i>
                                <p>You haven't submitted any quizzes yet</p>
                            </div>
                        </div>
                    </div>
                    <!-- Detail panel -->
                    <div class="card" id="resultDetailCard" style="display:none;">
                        <div class="card-header">
                            <h2><i class="fas fa-magnifying-glass-chart"></i> Submission Detail</h2>
                            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('resultDetailCard').style.display='none'">
                                <i class="fas fa-times"></i> Close
                            </button>
                        </div>
                        <div class="card-body" id="resultDetail"></div>
                    </div>
                </section>

                <!-- ==================== NOTIFICATIONS ==================== -->
                <section class="page" id="page-notifications">
                    <div class="page-actions">
                        <button class="btn btn-ghost" onclick="loadNotifications()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h2><i class="fas fa-bell"></i> Notifications</h2>
                        </div>
                        <div class="card-body" id="notificationsList">
                            <div class="empty-state">
                                <i class="fas fa-bell-slash"></i>
                                <p>No notifications</p>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="student.js"></script>
</body>
</html>
